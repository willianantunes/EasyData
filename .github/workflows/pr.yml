name: Validate PR

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'tests/**'
      - 'test/**'
      - '*.sln'
      - 'Dockerfile'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Shallow clones should be disabled for a better relevancy of analysis
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Install all tools
        run: |
          dotnet tool restore
      - name: Check if the project is well formatted
        run: |
          ./scripts/start-check-formatting.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Run JavaScript tests
        run: |
          npm ci
          npm test
      - name: Build the project, run all tests, and publish the test results
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_SOURCE_BRANCH: ${{ github.head_ref }}
          PR_TARGET_BRANCH: ${{ github.base_ref }}
          GITHUB_PR_NUMBER: ${{github.event.pull_request.number}}
        run: |
          set -e
          docker compose up --detach --wait --wait-timeout 120 db
          ./scripts/start-sonarcloud.sh